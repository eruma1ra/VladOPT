services:
  db:
    image: postgres:16-alpine
    container_name: vladopt-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-vladopt_prod}
      POSTGRES_USER: ${POSTGRES_USER:-vladopt}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-CHANGE_ME_STRONG_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: vladopt-app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    environment:
      NODE_ENV: production
      AUTH_MODE: google
      PORT: 5000
      DATABASE_URL: postgresql://${POSTGRES_USER:-vladopt}:${POSTGRES_PASSWORD:-CHANGE_ME_STRONG_PASSWORD}@db:5432/${POSTGRES_DB:-vladopt_prod}
    command: sh -c "npm run db:push && npm run start"
    ports:
      - "${APP_PUBLIC_PORT:-5000}:5000"
    volumes:
      - ./uploads:/app/uploads

volumes:
  postgres_data:
